        // === Slide Data Serialization Layer ===

        // Convert slide data into editable text for the textarea
        function slideToEditableText(slide) {
            const slideType = slide.type || 'content';
            // Hook, CTA, mermaid: use content string
            if (slideType === 'hook' || slideType === 'cta' || slideType === 'mermaid') {
                return slide.content || '';
            }
            // Content slides: prefer bullets array, fall back to content
            if (slide.bullets && Array.isArray(slide.bullets) && slide.bullets.length > 0) {
                return slide.bullets.join('\n');
            }
            return slide.content || '';
        }

        // Parse edited text back into slide data fields
        function editableTextToSlideFields(text, slide, selectedFormat) {
            const slideType = slide.type || 'content';
            // Hook/CTA: just content (subtitle handled separately)
            if (slideType === 'hook' || slideType === 'cta') {
                return { content: text };
            }
            // Mermaid: pass-through unchanged
            if (slideType === 'mermaid') {
                return { content: text };
            }
            // Content slides: parse based on selectedFormat
            if (selectedFormat === 'paragraph') {
                return { content: text, bullets: null, format: 'paragraph' };
            }
            // bullets or numbered: split by newline, filter empty
            const bullets = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const contentFallback = bullets.join('. ');
            return { bullets: bullets, format: selectedFormat || 'bullets', content: contentFallback };
        }

        // Convert textarea content when switching formats
        function convertContentForFormatChange(text, oldFormat, newFormat) {
            // bullets/numbered to paragraph: join lines with period-space
            if ((oldFormat === 'bullets' || oldFormat === 'numbered') && newFormat === 'paragraph') {
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                return lines.join('. ');
            }
            // paragraph to bullets/numbered: split by newline (single line = one bullet)
            if (oldFormat === 'paragraph' && (newFormat === 'bullets' || newFormat === 'numbered')) {
                // Keep text as-is; user has newlines or doesn't
                return text;
            }
            // bullets <-> numbered: no content change needed
            return text;
        }

        // Handle format dropdown change on a content slide
        function handleFormatChange(selectEl, slideNum) {
            const oldFormat = selectEl.dataset.currentFormat;
            const newFormat = selectEl.value;
            if (oldFormat === newFormat) return;

            // Find the content textarea in the same slide card
            const card = selectEl.closest('.slide-card');
            const textarea = card.querySelector('.slide-content-input');
            if (textarea) {
                textarea.value = convertContentForFormatChange(textarea.value, oldFormat, newFormat);
            }

            // Update tracked format
            selectEl.dataset.currentFormat = newFormat;

            // Mark slides as modified
            slidesModified = true;
            const saveSlidesBtn = document.getElementById('btn-save-slides');
            if (saveSlidesBtn) saveSlidesBtn.disabled = false;
        }

        // Fetch slides for selected entity
        async function fetchSlides(actionId) {
            try {
                const response = await fetch(`/api/action/${actionId}/slides`);
                if (response.ok) {
                    slidesData = await response.json();
                    slidesModified = false;
                } else {
                    slidesData = null;
                }
            } catch (error) {
                console.error('Failed to fetch slides:', error);
                slidesData = null;
            }
        }

        // Save slide edits
        async function saveSlides() {
            if (!selectedEntity || !slidesData || !slidesModified) return;

            // Collect edited slides from DOM (exclude mermaid slides)
            const slideCards = document.querySelectorAll('.slide-card');
            const editedSlides = [];

            slideCards.forEach(card => {
                const slideNum = parseInt(card.dataset.slideNumber);
                const slideType = card.dataset.slideType || 'content';

                // Exclude mermaid slides from save (read-only, nothing to persist)
                if (slideType === 'mermaid') return;

                const titleInput = card.querySelector('.slide-title-input');
                const contentInput = card.querySelector('.slide-content-input');
                const subtitleInput = card.querySelector('.slide-subtitle-input');
                const formatSelect = card.querySelector('.slide-format-select');

                if (titleInput || contentInput) {
                    // Find the original slide data for this slide number
                    const originalSlide = slidesData.slides.find(s => s.slide_number === slideNum) || {};
                    const selectedFormat = formatSelect ? formatSelect.value : (originalSlide.format || 'bullets');
                    const text = contentInput ? contentInput.value : '';

                    // Use serialization layer to parse text back into structured fields
                    const fields = editableTextToSlideFields(text, originalSlide, selectedFormat);

                    const edited = { slide_number: slideNum };
                    if (titleInput) edited.title = titleInput.value;
                    if (subtitleInput) edited.subtitle = subtitleInput.value;

                    // Merge parsed fields
                    Object.assign(edited, fields);

                    editedSlides.push(edited);
                }
            });

            try {
                const response = await fetch(`/api/action/${selectedEntity.id}/save-slides`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slides: editedSlides }),
                });
                const data = await response.json();

                if (response.ok) {
                    showToast(`Slides saved (${data.slides_count} slides)`);
                    slidesModified = false;
                    // Refresh slides data
                    await fetchSlides(selectedEntity.id);
                    // Refresh queue to update visual status
                    await fetchQueue();
                    // Re-find entity
                    const updated = queueData.items.find(i => i.id === selectedEntity.id);
                    if (updated) selectedEntity = updated;
                } else {
                    showToast(data.error || 'Save slides failed');
                }
            } catch (error) {
                console.error('Save slides failed:', error);
                showToast('Save slides failed');
            }
        }

        // Re-render with selected template
        async function reRender() {
            if (!selectedEntity) return;
            const status = selectedEntity.status;
            if (status !== 'staged' && status !== 'ready') return;

            const vs = selectedEntity.visual_status || '';
            if (vs === 'generating') return;

            const templateName = selectedTemplate || null;

            try {
                const response = await fetch(`/api/action/${selectedEntity.id}/render`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template: templateName }),
                });
                const data = await response.json();

                if (response.ok) {
                    showToast(`Rendering with ${data.template}...`);
                    selectedEntity.visual_status = 'generating';
                    renderStagingView();
                    renderEntityList();
                    pollVisualGeneration();
                } else {
                    showToast(data.error || 'Render failed');
                }
            } catch (error) {
                console.error('Render failed:', error);
                showToast('Render failed');
            }
        }

        // Build slide editor HTML
        function buildSlideEditorHtml() {
            if (!slidesData || !slidesData.slides || slidesData.slides.length === 0) {
                return '';
            }

            let slidesHtml = '';
            for (const slide of slidesData.slides) {
                const slideType = slide.type || 'content';
                const slideNum = slide.slide_number || 0;
                const title = slide.title || '';
                const isMermaid = slideType === 'mermaid';
                const isHookOrCta = slideType === 'hook' || slideType === 'cta';

                // Use serialization layer to get editable text
                const editableText = slideToEditableText(slide);
                const contentReadonly = isMermaid ? 'readonly' : '';
                const mermaidStyle = isMermaid ? 'style="font-family: monospace; font-size: 12px;"' : '';
                const contentRows = editableText.split('\n').length;
                const rows = Math.max(2, Math.min(6, contentRows));

                // Format dropdown for content slides only
                let formatDropdownHtml = '';
                if (slideType === 'content') {
                    const currentFormat = slide.format || 'bullets';
                    formatDropdownHtml = `
                            <div class="slide-field">
                                <div class="slide-field-label">Format</div>
                                <select class="slide-format-select" data-slide-number="${slideNum}" data-current-format="${escapeHtml(currentFormat)}"
                                    onchange="handleFormatChange(this, ${slideNum})">
                                    <option value="bullets" ${currentFormat === 'bullets' ? 'selected' : ''}>Bullets</option>
                                    <option value="numbered" ${currentFormat === 'numbered' ? 'selected' : ''}>Numbered</option>
                                    <option value="paragraph" ${currentFormat === 'paragraph' ? 'selected' : ''}>Paragraph</option>
                                </select>
                            </div>`;
                }

                // Subtitle field for hook and CTA slides
                let subtitleHtml = '';
                if (isHookOrCta) {
                    const subtitle = slide.subtitle || '';
                    subtitleHtml = `
                            <div class="slide-field">
                                <div class="slide-field-label">Subtitle</div>
                                <textarea class="slide-textarea slide-subtitle-input" rows="1">${escapeHtml(subtitle)}</textarea>
                            </div>`;
                }

                slidesHtml += `
                    <div class="slide-card" data-slide-number="${slideNum}" data-slide-type="${escapeHtml(slideType)}">
                        <div class="slide-card-header">
                            <span class="slide-type-badge ${slideType}">${escapeHtml(slideType)}</span>
                            <span class="slide-number">Slide ${slideNum}</span>
                        </div>
                        <div class="slide-card-body">
                            <div class="slide-field">
                                <div class="slide-field-label">Title</div>
                                <textarea class="slide-textarea slide-title-input" rows="1">${escapeHtml(title)}</textarea>
                            </div>
                            ${formatDropdownHtml}
                            <div class="slide-field">
                                <div class="slide-field-label">Content${isMermaid ? ' (read-only)' : ''}</div>
                                <textarea class="slide-textarea slide-content-input" rows="${rows}" ${contentReadonly} ${mermaidStyle}>${escapeHtml(editableText)}</textarea>
                            </div>
                            ${subtitleHtml}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="slides-section">
                    <div class="slides-section-header">
                        <span class="slides-section-title">Carousel Slides (${slidesData.slides.length})</span>
                        <button class="btn btn-save" id="btn-save-slides" onclick="saveSlides()" disabled>
                            Save Slides
                        </button>
                    </div>
                    <div class="slides-container">
                        ${slidesHtml}
                    </div>
                </div>
            `;
        }

        // Build template selector HTML
        function buildTemplateSelectorHtml() {
            if (!templatesData || !templatesData.templates || templatesData.templates.length === 0) {
                return '';
            }

            let optionsHtml = '';
            for (const tpl of templatesData.templates) {
                const selected = tpl.name === selectedTemplate ? 'selected' : '';
                const defLabel = tpl.is_default ? ' (default)' : '';
                optionsHtml += `<option value="${escapeHtml(tpl.name)}" ${selected}>${escapeHtml(tpl.name)}${defLabel} — ${escapeHtml(tpl.description)}</option>`;
            }

            return `
                <div class="template-selector">
                    <span class="template-selector-label">Template:</span>
                    <select class="template-select" id="template-select" onchange="selectedTemplate = this.value">
                        ${optionsHtml}
                    </select>
                    <button class="btn btn-render" onclick="reRender()">
                        Re-render
                    </button>
                </div>
            `;
        }

        // Update status bar
        function updateStatusBar() {
            const filtered = getFilteredItems();
            const label = selectedDecimalFilter
                ? `${filtered.length}/${queueData.total} entities`
                : `${queueData.total} entities`;
            document.getElementById('status-count').textContent = label;
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Check if staging view is active (entity is staged/ready)
        function isStagingMode() {
            return selectedEntity && (selectedEntity.status === 'staged' || selectedEntity.status === 'ready');
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            // Skip shortcuts when typing in input/textarea (except Escape and Ctrl+S)
            const isInTextInput = document.activeElement && (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT');
            if (isInTextInput) {
                // Ctrl+S / Cmd+S to save from textarea
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    saveEdit();
                    return;
                }
                // Escape to blur textarea
                if (e.key === 'Escape') {
                    document.activeElement.blur();
                    return;
                }
                // All other keys go to textarea
                return;
            }

            // Mode switching (always active, except 'p' which is context-dependent)
            if (e.key === 'q') {
                window.location.href = '/';
                return;
            }
            if (e.key === 'b') {
                window.location.href = '/browse';
                return;
            }
            if (e.key === 'V') {
                // Shift+V: open carousel viewer for selected item
                if (selectedEntity && selectedEntity.slide_urls && selectedEntity.slide_urls.length > 0) {
                    openCarouselViewer(selectedEntity.slide_urls, selectedEntity.pdf_url);
                    return;
                }
            }
            if (e.key === 'v') {
                // In staging mode, 'v' means generate visuals (not navigate to videos)
                if (isStagingMode()) {
                    generateVisuals();
                    return;
                }
                window.location.href = '/videos';
                return;
            }
            if (e.key === 'p') {
                // In staging mode, 'p' means publish (not navigate to prompts)
                if (isStagingMode()) {
                    publishItem();
                    return;
                }
                window.location.href = '/prompts';
                return;
            }

            const filteredItems = getFilteredItems();
            if (filteredItems.length === 0) return;

            // gg/G: vim jump-to-first / jump-to-last (ported from calendar app)
            if (e.key === 'g' && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
                if (pendingG) {
                    // gg — jump to first entity
                    e.preventDefault();
                    pendingG = false;
                    clearTimeout(pendingGTimeout);
                    pendingGTimeout = null;
                    selectEntity(0);
                } else {
                    // Start waiting for second g
                    pendingG = true;
                    pendingGTimeout = setTimeout(function() {
                        pendingG = false;
                        pendingGTimeout = null;
                    }, 500);
                }
                return;
            }
            if (e.key === 'G') {
                // G (shift+g) — jump to last entity
                e.preventDefault();
                pendingG = false;
                if (pendingGTimeout) { clearTimeout(pendingGTimeout); pendingGTimeout = null; }
                selectEntity(filteredItems.length - 1);
                return;
            }

            // Clear pending g on any other key
            if (pendingG) {
                pendingG = false;
                if (pendingGTimeout) { clearTimeout(pendingGTimeout); pendingGTimeout = null; }
            }

            if (e.key === 'j') {
                // Move down through entities (filtered)
                selectEntity(Math.min(selectedEntityIndex + 1, filteredItems.length - 1));
            } else if (e.key === 'k') {
                // Move up through entities (filtered)
                selectEntity(Math.max(selectedEntityIndex - 1, 0));
            } else if (e.key === 'l' || e.key === 'ArrowDown') {
                // l / ArrowDown: next round (forward in time)
                e.preventDefault();
                if (iterationsData && selectedRoundIndex < iterationsData.iterations.length - 1) {
                    selectedRoundIndex++;
                    if (selectedEntity) entityRoundIndex[selectedEntity.id] = selectedRoundIndex;
                    renderIterationView();
                }
            } else if (e.key === 'h' || e.key === 'ArrowUp') {
                // h / ArrowUp: prev round (back in time)
                e.preventDefault();
                if (iterationsData && selectedRoundIndex > 0) {
                    selectedRoundIndex--;
                    if (selectedEntity) entityRoundIndex[selectedEntity.id] = selectedRoundIndex;
                    renderIterationView();
                }
            } else if (e.key === 'i') {
                // Iterate
                triggerIterate();
            } else if (e.key === 'a') {
                // Stage (NOT approve)
                stageItem();
            } else if (e.key === 'c') {
                // Copy
                copyContent();
            } else if (e.key === 'n') {
                // T029: Toggle notes textarea
                const notesTextarea = document.getElementById('notes-textarea');
                if (notesTextarea) {
                    if (!notesOpen) {
                        toggleNotes();
                    }
                    notesTextarea.focus();
                }
            } else if (e.key === 's') {
                // Save edit (staging mode only)
                if (isStagingMode()) {
                    saveEdit();
                }
            }
        });

        // Initialize
        fetchQueue();

        // Poll for updates every 5 seconds
        setInterval(fetchQueue, 5000);

        // --- Carousel Viewer ---
        let carouselViewerOpen = false;
        let carouselCurrentSlide = 0;
        let carouselSlideUrls = [];

        function openCarouselViewer(slideUrls, pdfUrl, startSlide = 0) {
            if (!slideUrls || slideUrls.length === 0) return;
            carouselSlideUrls = slideUrls;
            carouselCurrentSlide = startSlide;
            carouselViewerOpen = true;

            let overlay = document.getElementById('carousel-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'carousel-overlay';
                overlay.className = 'carousel-overlay';
                overlay.innerHTML = `
                    <div class="carousel-overlay-close" id="carousel-close">&times;</div>
                    <div class="carousel-overlay-header">
                        <span class="slide-counter" id="carousel-counter"></span>
                        <a href="#" id="carousel-pdf-link" target="_blank">Open PDF</a>
                    </div>
                    <img class="carousel-slide-single" id="carousel-main-img" src="" alt="Slide">
                    <div class="carousel-nav-hint">
                        <kbd>←</kbd> / <kbd>→</kbd> navigate &nbsp;
                        <kbd>Esc</kbd> close
                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('carousel-close').addEventListener('click', closeCarouselViewer);
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeCarouselViewer();
                });
            }

            const pdfLink = document.getElementById('carousel-pdf-link');
            if (pdfUrl) {
                pdfLink.href = pdfUrl;
                pdfLink.style.display = '';
            } else {
                pdfLink.style.display = 'none';
            }

            overlay.classList.add('active');
            updateCarouselSlide();
        }

        function closeCarouselViewer() {
            carouselViewerOpen = false;
            const overlay = document.getElementById('carousel-overlay');
            if (overlay) overlay.classList.remove('active');
        }

        function updateCarouselSlide() {
            const img = document.getElementById('carousel-main-img');
            const counter = document.getElementById('carousel-counter');
            if (!img) return;
            img.src = carouselSlideUrls[carouselCurrentSlide];
            counter.textContent = `${carouselCurrentSlide + 1} / ${carouselSlideUrls.length}`;
        }

        // Keyboard nav for carousel viewer
        document.addEventListener('keydown', (e) => {
            if (!carouselViewerOpen) return;
            if (e.key === 'Escape') { closeCarouselViewer(); e.preventDefault(); return; }
            if (e.key === 'ArrowRight' || e.key === 'l') {
                carouselCurrentSlide = Math.min(carouselCurrentSlide + 1, carouselSlideUrls.length - 1);
                updateCarouselSlide(); e.preventDefault();
            }
            if (e.key === 'ArrowLeft' || e.key === 'h') {
                carouselCurrentSlide = Math.max(carouselCurrentSlide - 1, 0);
                updateCarouselSlide(); e.preventDefault();
            }
        });

        // Make thumbnail clickable
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('visual-thumbnail')) {
                if (selectedEntity && selectedEntity.slide_urls && selectedEntity.slide_urls.length > 0) {
                    openCarouselViewer(selectedEntity.slide_urls, selectedEntity.pdf_url);
                }
            }
        });
    </script>
</body>
</html>
