<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB Serve - Iteration View</title>
    <style>
        /* Catppuccin Mocha palette */
        :root {
            --base: #1e1e2e;
            --mantle: #181825;
            --crust: #11111b;
            --surface0: #313244;
            --surface1: #45475a;
            --surface2: #585b70;
            --overlay0: #6c7086;
            --overlay1: #7f849c;
            --text: #cdd6f4;
            --subtext1: #bac2de;
            --subtext0: #a6adc8;
            --lavender: #b4befe;
            --blue: #89b4fa;
            --sapphire: #74c7ec;
            --sky: #89dceb;
            --teal: #94e2d5;
            --green: #a6e3a1;
            --yellow: #f9e2af;
            --peach: #fab387;
            --maroon: #eba0ac;
            --red: #f38ba8;
            --mauve: #cba6f7;
            --pink: #f5c2e7;
            --flamingo: #f2cdcd;
            --rosewater: #f5e0dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--crust);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        /* Tmux-style layout */
        .tmux-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 1fr auto;
            height: 100vh;
            gap: 1px;
            background: var(--surface1);
        }

        .pane {
            background: var(--base);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            background: var(--mantle);
            padding: 8px 16px;
            font-size: 11px;
            color: var(--subtext0);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--surface0);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pane-header .pane-index {
            color: var(--mauve);
        }

        .pane-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        /* Entity list items */
        .entity-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--surface0);
            cursor: pointer;
            transition: background 0.1s;
        }

        .entity-item:hover {
            background: var(--mantle);
        }

        .entity-item.selected {
            background: var(--surface0);
            border-left: 3px solid var(--sapphire);
        }

        .entity-title {
            font-size: 12px;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entity-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 11px;
            color: var(--overlay0);
        }

        .entity-score {
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
        }

        .entity-score.high { background: var(--green); color: var(--crust); }
        .entity-score.mid { background: var(--yellow); color: var(--crust); }
        .entity-score.low { background: var(--red); color: var(--crust); }
        .entity-score.none { background: var(--surface1); color: var(--overlay0); }

        .entity-rounds {
            color: var(--overlay0);
            font-size: 10px;
        }

        .entity-status {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
        }

        .entity-status.staged { background: var(--mauve); color: var(--crust); }
        .entity-status.iterating { background: var(--yellow); color: var(--crust); }
        .entity-status.ready { background: var(--green); color: var(--crust); }
        .entity-status.generating { background: var(--peach); color: var(--crust); }

        .entity-decimal {
            color: var(--mauve);
            font-size: 10px;
        }

        /* Platform badges */
        .platform-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .platform-badge.linkedin { background: var(--blue); color: var(--crust); }
        .platform-badge.skool { background: var(--green); color: var(--crust); }

        /* Right pane - Iteration view */
        .preview-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--overlay0);
            text-align: center;
            padding: 40px;
        }

        .preview-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .iteration-view {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .iteration-header {
            margin-bottom: 16px;
        }

        .iteration-title {
            color: var(--sapphire);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .iteration-subtitle {
            color: var(--overlay0);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Round navigator */
        .round-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--mantle);
            border-radius: 6px;
        }

        .round-nav-label {
            color: var(--subtext0);
            font-size: 11px;
            font-weight: 600;
        }

        .round-tabs {
            display: flex;
            gap: 4px;
        }

        .round-tab {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            background: var(--surface0);
            color: var(--overlay0);
            border: none;
            font-family: inherit;
            transition: all 0.1s;
        }

        .round-tab:hover { background: var(--surface1); color: var(--text); }
        .round-tab.active { background: var(--sapphire); color: var(--crust); font-weight: 600; }

        .round-nav-hint {
            color: var(--overlay0);
            font-size: 10px;
            margin-left: auto;
        }

        .round-nav-hint .key-hint {
            background: var(--surface0);
            color: var(--sapphire);
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
        }

        /* Scores section */
        .scores-section {
            margin-bottom: 16px;
        }

        .scores-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .scores-title {
            color: var(--overlay0);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .overall-score {
            font-size: 16px;
            font-weight: 700;
        }

        .overall-score.high { color: var(--green); }
        .overall-score.mid { color: var(--yellow); }
        .overall-score.low { color: var(--red); }

        .scores-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: var(--mantle);
            border-radius: 4px;
            font-size: 11px;
        }

        .score-label {
            color: var(--subtext0);
        }

        .score-value {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .score-value.high { color: var(--green); }
        .score-value.mid { color: var(--yellow); }
        .score-value.low { color: var(--red); }

        .delta-badge {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .delta-badge.up { background: rgba(166, 227, 161, 0.2); color: var(--green); }
        .delta-badge.down { background: rgba(243, 139, 168, 0.2); color: var(--red); }
        .delta-badge.same { background: rgba(108, 112, 134, 0.15); color: var(--overlay0); }

        .not-judged {
            padding: 12px;
            background: var(--mantle);
            border-radius: 6px;
            color: var(--overlay0);
            font-size: 12px;
            text-align: center;
            font-style: italic;
        }

        /* Post content */
        .post-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .post-section-title {
            color: var(--overlay0);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .post-text {
            flex: 1;
            background: var(--mantle);
            padding: 16px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Actions bar */
        .actions-bar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.1s;
        }

        .btn-primary {
            background: var(--green);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-primary:hover { background: var(--teal); }

        .btn-secondary {
            background: var(--surface0);
            color: var(--text);
        }

        .btn-secondary:hover { background: var(--surface1); }

        .btn-iterate {
            background: var(--mauve);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-iterate:hover { background: var(--lavender); }

        .btn .key {
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Iterating spinner overlay */
        .iterating-overlay {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--yellow);
            color: var(--crust);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Spinner animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--crust);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Status bar */
        .status-bar {
            grid-column: 1 / -1;
            background: var(--sapphire);
            color: var(--crust);
            padding: 4px 16px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .status-section {
            display: flex;
            gap: 24px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-key {
            background: rgba(0,0,0,0.2);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface0);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--surface1);
            z-index: 1000;
        }

        .toast.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .toast-icon {
            color: var(--green);
            font-size: 16px;
        }

        /* Empty state */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--overlay0);
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 13px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--mantle); }
        ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--surface2); }

        /* Shortcut hints */
        .shortcut-bar {
            background: var(--mantle);
            padding: 8px 16px;
            font-size: 11px;
            color: var(--subtext0);
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--surface0);
            flex-wrap: wrap;
        }

        .shortcut {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .key-hint {
            background: var(--surface0);
            color: var(--sapphire);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        /* Mode toggle */
        .mode-toggle {
            display: flex;
            gap: 4px;
            background: var(--surface0);
            padding: 2px;
            border-radius: 4px;
        }

        .mode-btn {
            padding: 4px 8px;
            font-size: 11px;
            border: none;
            background: transparent;
            color: var(--overlay0);
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .mode-btn.active {
            background: var(--sapphire);
            color: var(--crust);
        }

        .mode-btn:hover:not(.active) { color: var(--text); }

        .mode-btn .key-hint {
            background: rgba(0,0,0,0.2);
        }

        /* Section header */
        .section-header {
            background: var(--mantle);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface0);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .section-title {
            color: var(--text);
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-count {
            background: var(--sapphire);
            color: var(--crust);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Overall delta in header */
        .overall-delta {
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
        .overall-delta.up { color: var(--green); }
        .overall-delta.down { color: var(--red); }
        .overall-delta.same { color: var(--overlay0); }

        /* T029: User feedback/notes section */
        .notes-section {
            padding: 8px 16px;
            border-bottom: 1px solid var(--surface0);
        }
        .notes-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--subtext0);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }
        .notes-toggle:hover {
            color: var(--text);
        }
        .notes-toggle .key-hint {
            background: var(--surface0);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
        }
        .notes-textarea {
            width: 100%;
            background: var(--mantle);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text);
            border: 1px solid var(--surface0);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: vertical;
            min-height: 60px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
            margin-top: 6px;
        }
        .notes-textarea:focus {
            border-color: var(--sapphire);
        }
        .notes-textarea::placeholder {
            color: var(--overlay0);
        }

        /* Staging area textarea */
        .staging-textarea {
            flex: 1;
            background: var(--mantle);
            padding: 16px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
            border: 1px solid var(--surface0);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            resize: none;
            min-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .staging-textarea:focus {
            border-color: var(--sapphire);
        }

        .staging-textarea.modified {
            border-color: var(--yellow);
        }

        /* Visual status indicators */
        .visual-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .visual-status.generating {
            background: var(--peach);
            color: var(--crust);
        }

        .visual-status.ready {
            background: rgba(166, 227, 161, 0.15);
            color: var(--green);
            border: 1px solid rgba(166, 227, 161, 0.3);
        }

        .visual-status.failed {
            background: rgba(243, 139, 168, 0.15);
            color: var(--red);
            border: 1px solid rgba(243, 139, 168, 0.3);
        }

        .visual-status.text_only {
            background: rgba(137, 180, 250, 0.15);
            color: var(--blue);
            border: 1px solid rgba(137, 180, 250, 0.3);
        }

        .visual-thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid var(--surface0);
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }
        .visual-thumbnail:hover {
            transform: scale(1.1);
            border-color: var(--lavender);
        }

        /* Carousel viewer overlay */
        .carousel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .carousel-overlay.active { display: flex; }
        .carousel-overlay-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            color: var(--text);
            font-size: 13px;
        }
        .carousel-overlay-header .slide-counter {
            font-size: 14px;
            color: var(--subtext0);
        }
        .carousel-overlay-header a {
            color: var(--lavender);
            text-decoration: none;
            font-size: 12px;
            padding: 4px 12px;
            border: 1px solid var(--surface1);
            border-radius: 4px;
        }
        .carousel-overlay-header a:hover { background: var(--surface0); }
        .carousel-overlay-close {
            position: absolute;
            top: 16px; right: 24px;
            color: var(--overlay0);
            font-size: 24px;
            cursor: pointer;
            z-index: 10000;
        }
        .carousel-overlay-close:hover { color: var(--text); }
        .carousel-slides-strip {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            max-width: 100%;
            padding: 8px 0;
            align-items: center;
        }
        .carousel-slides-strip img {
            max-height: 70vh;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }
        .carousel-slides-strip img.current {
            border-color: var(--lavender);
        }
        .carousel-slide-single {
            max-height: 80vh;
            max-width: 90vw;
            border-radius: 8px;
        }
        .carousel-nav-hint {
            margin-top: 12px;
            font-size: 11px;
            color: var(--overlay0);
        }
        .carousel-nav-hint kbd {
            background: var(--surface0);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        /* Edit info bar */
        .edit-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--overlay0);
            margin-bottom: 4px;
        }

        .edit-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--surface0);
            color: var(--subtext0);
        }

        /* Generate visuals button */
        .btn-generate {
            background: var(--peach);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-generate:hover { background: var(--yellow); }

        /* Publish button */
        .btn-publish {
            background: var(--green);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-publish:hover { background: var(--teal); }

        /* Save button */
        .btn-save {
            background: var(--sapphire);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-save:hover { background: var(--blue); }

        /* Slide editor */
        .slides-section {
            margin-top: 16px;
            border-top: 1px solid var(--surface0);
            padding-top: 12px;
        }

        .slides-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slides-section-title {
            color: var(--overlay0);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .slide-card {
            background: var(--mantle);
            border: 1px solid var(--surface0);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .slide-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--surface0);
            font-size: 11px;
        }

        .slide-type-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .slide-type-badge.hook { background: var(--peach); color: var(--crust); }
        .slide-type-badge.content { background: var(--blue); color: var(--crust); }
        .slide-type-badge.mermaid { background: var(--mauve); color: var(--crust); }
        .slide-type-badge.cta { background: var(--green); color: var(--crust); }

        .slide-number {
            color: var(--overlay0);
            font-size: 10px;
        }

        .slide-card-body {
            padding: 8px 12px;
        }

        .slide-field {
            margin-bottom: 6px;
        }

        .slide-field-label {
            color: var(--overlay0);
            font-size: 10px;
            margin-bottom: 2px;
        }

        .slide-textarea {
            width: 100%;
            background: var(--base);
            color: var(--text);
            border: 1px solid var(--surface0);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            min-height: 40px;
        }

        .slide-textarea:focus {
            border-color: var(--sapphire);
        }

        .slide-textarea.modified {
            border-color: var(--yellow);
        }

        .slide-textarea[readonly] {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Template selector */
        .template-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: var(--mantle);
            border-radius: 6px;
        }

        .template-selector-label {
            color: var(--subtext0);
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .template-select {
            flex: 1;
            background: var(--surface0);
            color: var(--text);
            border: 1px solid var(--surface1);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .template-select:focus {
            border-color: var(--sapphire);
        }

        /* Re-render button */
        .btn-render {
            background: var(--mauve);
            color: var(--crust);
            font-weight: 600;
        }

        .btn-render:hover { background: var(--lavender); }

        /* Stale visual status */
        .visual-status.stale {
            background: rgba(249, 226, 175, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(249, 226, 175, 0.3);
        }

        /* Slides container scrollable */
        .slides-container {
            max-height: 400px;
            overflow-y: auto;
        }

        /* Feedback sections (Phase 8A) */
        .feedback-section {
            margin-bottom: 16px;
        }

        .feedback-section-title {
            color: var(--overlay0);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .improvement-card {
            background: var(--mantle);
            border: 1px solid var(--surface0);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 6px;
        }

        .improvement-criterion {
            color: var(--sapphire);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: capitalize;
        }

        .improvement-issue {
            color: var(--red);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .improvement-suggestion {
            color: var(--green);
            font-size: 12px;
        }

        .improvement-label {
            color: var(--overlay0);
            font-size: 10px;
            font-weight: 600;
            margin-right: 4px;
        }

        .strengths-list {
            list-style: none;
            padding: 0;
        }

        .strength-item {
            background: rgba(166, 227, 161, 0.1);
            border: 1px solid rgba(166, 227, 161, 0.2);
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 4px;
            color: var(--green);
            font-size: 12px;
        }

        .rewritten-hook {
            background: rgba(203, 166, 247, 0.1);
            border: 1px solid rgba(203, 166, 247, 0.2);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .rewritten-hook-label {
            color: var(--mauve);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        /* Score progression (Phase 8A) */
        .score-progression {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--overlay0);
            flex-wrap: wrap;
        }

        .score-progression-label {
            font-weight: 600;
            color: var(--subtext0);
        }

        .score-progression-arrow {
            color: var(--overlay0);
        }
    </style>
</head>
<body>
    <div class="tmux-container">
        <!-- Left Pane: Entity List -->
        <div class="pane">
            <div class="pane-header">
                <span><span class="pane-index">0:</span> iterations</span>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="mode-toggle">
                        <a href="/" class="mode-btn"><span class="key-hint">q</span></a>
                        <button class="mode-btn active"><span class="key-hint">r</span></button>
                        <a href="/browse" class="mode-btn"><span class="key-hint">b</span></a>
                        <a href="/videos" class="mode-btn"><span class="key-hint">v</span></a>
                        <a href="/prompts" class="mode-btn"><span class="key-hint">p</span></a>
                    </div>
                    <span id="connection-status" style="color: var(--green);">connected</span>
                </div>
            </div>

            <div class="pane-body" id="entity-list">
                <!-- Populated by JavaScript -->
            </div>
            <div class="shortcut-bar" id="shortcut-bar">
                <span class="shortcut"><span class="key-hint">j/k</span> entities</span>
                <span class="shortcut"><span class="key-hint">h/l</span> rounds</span>
                <span class="shortcut"><span class="key-hint">gg/G</span> first/last</span>
                <span class="shortcut"><span class="key-hint">i</span> iterate</span>
                <span class="shortcut"><span class="key-hint">a</span> stage</span>
                <span class="shortcut"><span class="key-hint">c</span> copy</span>
                <span class="shortcut"><span class="key-hint">v</span> visuals</span>
                <span class="shortcut"><span class="key-hint">V</span> view carousel</span>
                <span class="shortcut"><span class="key-hint">s</span> save</span>
            </div>
        </div>

        <!-- Right Pane: Iteration Detail -->
        <div class="pane">
            <div class="pane-header">
                <span><span class="pane-index">1:</span> detail</span>
                <span id="preview-type-label" style="color: var(--sapphire);"></span>
            </div>
            <div class="pane-body" id="preview-pane">
                <div class="preview-empty">
                    <div class="preview-empty-icon">&#x1F504;</div>
                    <div>Select an entity to view iterations</div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-section">
                <span>[kb-serve]</span>
                <span id="status-count">0 entities</span>
            </div>
            <div class="status-section">
                <span class="status-item"><span class="status-key">q</span> queue</span>
                <span class="status-item"><span class="status-key">r</span> runway</span>
                <span class="status-item"><span class="status-key">b</span> browse</span>
                <span class="status-item"><span class="status-key">v</span> videos</span>
                <span class="status-item"><span class="status-key">p</span> prompts</span>
                <span id="status-host">localhost:8765</span>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">+</span>
        <span id="toast-message">Copied to clipboard!</span>
    </div>

    <script>
        // State
        let queueData = { items: [], total: 0 };
        let selectedEntityIndex = 0;
        let selectedEntity = null;
        let iterationsData = null;  // from /api/action/<id>/iterations
        let selectedDecimalFilter = null;  // null = "All", or a decimal string like "50.03.01"
        let selectedRoundIndex = -1; // which round is active in the detail pane
        let entityRoundIndex = {};  // T029: cache selectedRoundIndex per entity id
        let templatesData = null;   // from /api/templates
        let slidesData = null;      // from /api/action/<id>/slides
        let selectedTemplate = null; // selected template name
        let slidesModified = false;  // track if slides have been edited
        let pendingG = false;           // T029: gg double-key state
        let pendingGTimeout = null;     // T029: gg timeout handle
        let notesOpen = false;          // T029: notes textarea visibility

        // XSS protection helper
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const PLATFORM_CLASS = {
            'LinkedIn': 'linkedin',
            'Skool': 'skool',
        };

        // Score class helper
        function scoreClass(score) {
            if (score === null || score === undefined) return 'none';
            if (score >= 4) return 'high';
            if (score >= 3) return 'mid';
            return 'low';
        }

        // Format criterion name
        function formatCriterion(name) {
            return name.replace(/_/g, ' ');
        }

        // Delta text helper
        function deltaText(prev, curr) {
            if (prev === null || prev === undefined || curr === null || curr === undefined) return '';
            const diff = curr - prev;
            if (diff > 0) return `<span class="delta-badge up">+${diff}</span>`;
            if (diff < 0) return `<span class="delta-badge down">${diff}</span>`;
            return `<span class="delta-badge same">=</span>`;
        }

        // Overall delta text
        function overallDelta(prev, curr) {
            if (prev === null || prev === undefined) return '';
            const diff = (curr - prev).toFixed(1);
            if (diff > 0) return `<span class="overall-delta up">+${diff}</span>`;
            if (diff < 0) return `<span class="overall-delta down">${diff}</span>`;
            return `<span class="overall-delta same">=</span>`;
        }

        // Fetch entity list
        async function fetchQueue() {
            try {
                const response = await fetch('/api/posting-queue-v2');
                queueData = await response.json();

                // Re-apply filter: clamp selectedEntityIndex to filtered list
                const filtered = getFilteredItems();
                if (selectedEntityIndex >= filtered.length) {
                    selectedEntityIndex = Math.max(0, filtered.length - 1);
                }

                // If currently selected entity disappeared from filtered list, re-select
                if (selectedEntity && !filtered.find(i => i.id === selectedEntity.id)) {
                    if (filtered.length > 0) {
                        selectedEntityIndex = 0;
                        selectedEntity = filtered[0];
                    } else {
                        selectedEntity = null;
                    }
                }

                renderEntityList();
                updateStatusBar();

                // Auto-select first item if none selected
                if (selectedEntity === null && filtered.length > 0) {
                    selectEntity(0);
                }

                // If an entity is selected and iterating, refresh iterations
                // (skip if pollIteration is already polling to prevent dual-poll race)
                if (selectedEntity && selectedEntity.iterable && selectedEntity.iterating && !iterationPollActive) {
                    await fetchIterations(selectedEntity.id);
                }
            } catch (error) {
                console.error('Failed to fetch queue:', error);
                document.getElementById('connection-status').innerHTML = 'disconnected';
                document.getElementById('connection-status').style.color = 'var(--red)';
            }
        }

        // Get filtered items based on selectedDecimalFilter
        function getFilteredItems() {
            if (!selectedDecimalFilter) return queueData.items;
            return queueData.items.filter(item => item.source_decimal === selectedDecimalFilter);
        }

        // Get unique decimals from all items
        function getUniqueDecimals() {
            const decimals = new Set();
            for (const item of queueData.items) {
                if (item.source_decimal) decimals.add(item.source_decimal);
            }
            return Array.from(decimals).sort();
        }

        // Render entity list
        function renderEntityList() {
            const list = document.getElementById('entity-list');
            list.innerHTML = '';

            if (queueData.items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#x1F4DD;</div>
                        <div class="empty-state-text">No items to review.<br>Run <code>kb analyze -t linkedin_v2</code> to generate content.</div>
                    </div>
                `;
                return;
            }

            const filteredItems = getFilteredItems();
            const totalItems = queueData.items.length;
            const filteredCount = filteredItems.length;
            const countLabel = selectedDecimalFilter
                ? `${filteredCount}/${totalItems}`
                : `${totalItems}`;

            // Build decimal filter dropdown
            const decimals = getUniqueDecimals();
            let filterOptionsHtml = '<option value="">All decimals</option>';
            for (const d of decimals) {
                const selected = d === selectedDecimalFilter ? ' selected' : '';
                filterOptionsHtml += `<option value="${escapeHtml(d)}"${selected}>${escapeHtml(d)}</option>`;
            }

            // Section header with filter
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `
                <div class="section-title">
                    <span>Iterations</span>
                    <span class="section-count">${countLabel}</span>
                </div>
                <select class="template-select" id="decimal-filter" style="max-width:120px;">
                    ${filterOptionsHtml}
                </select>
            `;
            list.appendChild(header);

            // Attach filter change handler
            const filterSelect = header.querySelector('#decimal-filter');
            filterSelect.addEventListener('change', () => {
                selectedDecimalFilter = filterSelect.value || null;
                const newFiltered = getFilteredItems();
                // Clamp selectedEntityIndex to filtered list
                if (selectedEntityIndex >= newFiltered.length) {
                    selectedEntityIndex = Math.max(0, newFiltered.length - 1);
                }
                renderEntityList();
                // Re-select entity from filtered list
                if (newFiltered.length > 0) {
                    selectEntity(selectedEntityIndex);
                }
            });

            if (filteredItems.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.innerHTML = `<div class="empty-state-text">No items for ${escapeHtml(selectedDecimalFilter)}</div>`;
                list.appendChild(empty);
                return;
            }

            filteredItems.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'entity-item';
                if (index === selectedEntityIndex) el.classList.add('selected');

                const platformClass = PLATFORM_CLASS[item.destination] || '';
                const sc = scoreClass(item.latest_score);
                const scoreHtml = item.latest_score !== null
                    ? `<span class="entity-score ${sc}">${item.latest_score.toFixed(1)}</span>`
                    : `<span class="entity-score none">--</span>`;

                let statusHtml = '';
                if (item.iterating) {
                    statusHtml = '<span class="entity-status iterating"><span class="spinner" style="width:8px;height:8px;border-width:1.5px;"></span> iterating</span>';
                } else if (item.status === 'ready') {
                    statusHtml = '<span class="entity-status ready">ready</span>';
                } else if (item.visual_status === 'generating') {
                    statusHtml = '<span class="entity-status generating"><span class="spinner" style="width:8px;height:8px;border-width:1.5px;"></span> generating</span>';
                } else if (item.status === 'staged') {
                    statusHtml = '<span class="entity-status staged">staged</span>';
                }

                const roundsText = item.iteration_count > 0
                    ? `${item.iteration_count} round${item.iteration_count > 1 ? 's' : ''}`
                    : '';

                el.innerHTML = `
                    <div class="entity-title">${escapeHtml(item.source_title)}</div>
                    <div class="entity-meta">
                        ${scoreHtml}
                        <span class="entity-rounds">${roundsText}</span>
                        ${statusHtml}
                        <span class="entity-decimal">${escapeHtml(item.source_decimal)}</span>
                        <span class="platform-badge ${platformClass}" style="margin-left:auto;">${escapeHtml(item.destination)}</span>
                    </div>
                `;

                el.addEventListener('click', () => selectEntity(index));
                list.appendChild(el);
            });
        }

        // Select an entity (index into filtered list)
        async function selectEntity(index) {
            const filtered = getFilteredItems();
            if (index < 0 || index >= filtered.length) return;

            selectedEntityIndex = index;
            selectedEntity = filtered[index];

            // Update UI
            document.querySelectorAll('.entity-item').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
                if (i === index) {
                    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            });

            document.getElementById('preview-type-label').textContent = selectedEntity.type;

            // T029: Skip /iterations call for non-iterable types (prevents 400s)
            if (!selectedEntity.iterable) {
                iterationsData = { iterations: [], iterating: false, total_rounds: 0, score_history: [] };
                selectedRoundIndex = -1;
                renderNonIterableView();
                return;
            }

            // Show staging view for staged/ready items, iteration view for others
            if (selectedEntity.status === 'staged' || selectedEntity.status === 'ready') {
                await fetchIterations(selectedEntity.id);
                await fetchTemplates();
                await fetchSlides(selectedEntity.id);
                renderStagingView();
            } else {
                await fetchIterations(selectedEntity.id);
            }
        }

        // Fetch iterations for selected entity
        async function fetchIterations(actionId) {
            try {
                const response = await fetch(`/api/action/${actionId}/iterations`);
                iterationsData = await response.json();

                // T029 BUG-3: Restore cached round index, or default to latest
                if (iterationsData.iterations.length > 0) {
                    if (actionId in entityRoundIndex && entityRoundIndex[actionId] < iterationsData.iterations.length) {
                        selectedRoundIndex = entityRoundIndex[actionId];
                    } else {
                        selectedRoundIndex = iterationsData.iterations.length - 1;
                    }
                } else {
                    selectedRoundIndex = -1;
                }

                renderIterationView();
            } catch (error) {
                console.error('Failed to fetch iterations:', error);
                document.getElementById('preview-pane').innerHTML = `
                    <div class="preview-empty">
                        <div class="preview-empty-icon">&#x26A0;</div>
                        <div>Failed to load iterations</div>
                    </div>
                `;
            }
        }

        // T029: Render clean state for non-iterable items
        function renderNonIterableView() {
            const pane = document.getElementById('preview-pane');
            if (!selectedEntity) return;

            pane.innerHTML = `
                <div class="iteration-view">
                    <div class="iteration-header">
                        <div class="iteration-title">${escapeHtml(selectedEntity.source_title)}</div>
                        <div class="iteration-subtitle">
                            <span>${escapeHtml(selectedEntity.source_decimal)}</span>
                            <span class="platform-badge ${PLATFORM_CLASS[selectedEntity.destination] || ''}">${escapeHtml(selectedEntity.destination)}</span>
                            <span>~${selectedEntity.word_count} words</span>
                        </div>
                    </div>
                    <div class="scores-section">
                        <div class="not-judged">Not iterable</div>
                    </div>
                    <div class="post-section">
                        <div class="post-section-title">Content</div>
                        <div class="post-text">${escapeHtml(selectedEntity.content || '')}</div>
                    </div>
                    <div class="actions-bar">
                        <button class="btn btn-primary" onclick="stageItem()">
                            <span>Stage</span>
                            <span class="key">a</span>
                        </button>
                        <button class="btn btn-secondary" onclick="copyContent()">
                            <span>Copy</span>
                            <span class="key">c</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // Render the iteration detail view
        function renderIterationView() {
            const pane = document.getElementById('preview-pane');

            if (!iterationsData || iterationsData.iterations.length === 0) {
                pane.innerHTML = `
                    <div class="preview-empty">
                        <div class="preview-empty-icon">&#x1F4DD;</div>
                        <div>No iterations yet</div>
                    </div>
                `;
                return;
            }

            const iterations = iterationsData.iterations;
            const current = iterations[selectedRoundIndex] || iterations[iterations.length - 1];
            const prevRound = selectedRoundIndex > 0 ? iterations[selectedRoundIndex - 1] : null;

            // Build round tabs
            let roundTabsHtml = '';
            iterations.forEach((iter, i) => {
                const active = i === selectedRoundIndex ? ' active' : '';
                const sc = iter.scores ? scoreClass(iter.scores.overall) : 'none';
                const label = iter.scores
                    ? `R${iter.round} (${iter.scores.overall.toFixed(1)})`
                    : `R${iter.round}`;
                roundTabsHtml += `<button class="round-tab${active}" data-round="${i}">${label}</button>`;
            });

            // Build scores section
            let scoresHtml = '';
            if (current.scores) {
                const sc = scoreClass(current.scores.overall);
                const prevScores = prevRound && prevRound.scores ? prevRound.scores : null;

                let overallDeltaHtml = prevScores
                    ? overallDelta(prevScores.overall, current.scores.overall)
                    : '';

                let criteriaHtml = '';
                for (const [criterion, score] of Object.entries(current.scores.criteria || {})) {
                    const csc = scoreClass(score);
                    const prevScore = prevScores && prevScores.criteria ? prevScores.criteria[criterion] : null;
                    const delta = prevScore !== null && prevScore !== undefined
                        ? deltaText(prevScore, score)
                        : '';

                    criteriaHtml += `
                        <div class="score-item">
                            <span class="score-label">${formatCriterion(criterion)}</span>
                            <span class="score-value ${csc}">${score}/5 ${delta}</span>
                        </div>
                    `;
                }

                scoresHtml = `
                    <div class="scores-section">
                        <div class="scores-header">
                            <span class="scores-title">Judge Scores</span>
                            <span class="overall-score ${sc}">${current.scores.overall.toFixed(1)}/5.0 ${overallDeltaHtml}</span>
                        </div>
                        <div class="scores-grid">
                            ${criteriaHtml}
                        </div>
                    </div>
                `;
            } else {
                scoresHtml = `
                    <div class="scores-section">
                        <div class="not-judged">Awaiting judge...</div>
                    </div>
                `;
            }

            // Build feedback section (improvements, strengths, rewritten hook)
            let feedbackHtml = '';
            if (current.scores) {
                // Improvements
                const improvements = current.scores.improvements || [];
                if (improvements.length > 0) {
                    let improvementsHtml = '';
                    for (const imp of improvements) {
                        improvementsHtml += `
                            <div class="improvement-card">
                                <div class="improvement-criterion">${escapeHtml(formatCriterion(imp.criterion || ''))}</div>
                                <div class="improvement-issue"><span class="improvement-label">Issue:</span>${escapeHtml(imp.current_issue || '')}</div>
                                <div class="improvement-suggestion"><span class="improvement-label">Fix:</span>${escapeHtml(imp.suggestion || '')}</div>
                            </div>
                        `;
                    }
                    feedbackHtml += `
                        <div class="feedback-section">
                            <div class="feedback-section-title">Improvements</div>
                            ${improvementsHtml}
                        </div>
                    `;
                }

                // Strengths
                const strengths = current.scores.strengths || [];
                if (strengths.length > 0) {
                    let strengthsHtml = '';
                    for (const s of strengths) {
                        strengthsHtml += `<li class="strength-item">${escapeHtml(s)}</li>`;
                    }
                    feedbackHtml += `
                        <div class="feedback-section">
                            <div class="feedback-section-title">Strengths</div>
                            <ul class="strengths-list">${strengthsHtml}</ul>
                        </div>
                    `;
                }

                // Rewritten hook
                const rewrittenHook = current.scores.rewritten_hook;
                if (rewrittenHook) {
                    feedbackHtml += `
                        <div class="feedback-section">
                            <div class="rewritten-hook-label">Suggested Hook Rewrite</div>
                            <div class="rewritten-hook">${escapeHtml(rewrittenHook)}</div>
                        </div>
                    `;
                }
            }

            // Build score progression text
            let scoreProgressionHtml = '';
            const scoreHistory = iterationsData.score_history || [];
            if (scoreHistory.length > 1) {
                let progressionParts = [];
                scoreHistory.forEach((entry, i) => {
                    const score = (entry.overall || 0).toFixed(1);
                    const sc = scoreClass(entry.overall);
                    const colorVar = sc === 'high' ? 'var(--green)' : (sc === 'mid' ? 'var(--yellow)' : 'var(--red)');
                    progressionParts.push(`<span style="color:${colorVar};">R${i}: ${score}</span>`);
                });
                scoreProgressionHtml = `
                    <div class="score-progression">
                        <span class="score-progression-label">Progress:</span>

            const actionId = selectedEntity.id;
            const check = async () => {
                try {
                    const response = await fetch(`/api/action/${actionId}/iterations`);
                    const data = await response.json();

                        // Iteration complete - refresh everything
                        iterationPollActive = false;
                        iterationsData = data;

                        // T029 BUG-4: Select latest round that HAS scores, not just latest round
                        selectedRoundIndex = data.iterations.length - 1;
                        for (let ri = data.iterations.length - 1; ri >= 0; ri--) {
                            if (data.iterations[ri].scores) {
                                selectedRoundIndex = ri;
                                break;
                            }
                        }
                        if (selectedEntity) entityRoundIndex[selectedEntity.id] = selectedRoundIndex;

                        renderIterationView();

                        // Also refresh the entity list for updated scores
                        await fetchQueue();

                        showToast('Iteration complete!');
                        return;

                    // Still iterating, poll again
                    setTimeout(check, 2000);
                } catch (error) {

                    setTimeout(check, 3000);
